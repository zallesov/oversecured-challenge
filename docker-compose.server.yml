# Server stack for the Android SAST system. Self-contained; coexists with other stacks on
# the host. All published host ports are offset into 18xxx and the compose project is isolated
# by name (`-p oversecured`). Temporal gRPC is internal only.
#
#   docker compose -f docker-compose.server.yml -p oversecured --env-file .env.server up -d
#
# Images are pre-built and `docker load`ed on the remote (no registry); the `build:` blocks are
# only used when building locally with `--build`. See docs/server-stack.md.

services:
  temporal-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.29.6
    restart: unless-stopped
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
    # gRPC 7233 internal only — not published.

  temporal-ui:
    image: temporalio/ui:2.51.0
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_UI_CORS_ORIGINS:-http://localhost:18030}
    ports:
      - "${TEMPORAL_UI_PORT:-18080}:8080"

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.28.4
    restart: unless-stopped
    command: ["serve", "--migrationsDir", "/pb_migrations"]
    environment:
      PB_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:?set POCKETBASE_ADMIN_EMAIL in .env.server}
      PB_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:?set POCKETBASE_ADMIN_PASSWORD in .env.server}
    ports:
      - "${POCKETBASE_PORT:-18090}:8090"
    volumes:
      - pb-data:/pb_data
      - ./ui/pb_migrations:/pb_migrations:ro

  ui:
    image: oversecured-ui:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        # Browser-reachable PB URL baked into the client bundle at build time.
        # Set to the public host:port (or reverse-proxy path) of the PocketBase service.
        VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL:-http://localhost:18090}
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
      pocketbase:
        condition: service_started
    environment:
      # Server-to-PB (internal network)
      POCKETBASE_URL: http://pocketbase:8090
      # Superuser credentials — must match PB_ADMIN_* in the pocketbase service
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:?set POCKETBASE_ADMIN_EMAIL in .env.server}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:?set POCKETBASE_ADMIN_PASSWORD in .env.server}
      # Base URL the backend advertises to the worker for status callbacks
      INTERNAL_BASE_URL: http://ui:3000
      # Shared secret for validating inbound status callbacks from the worker
      STATUS_CALLBACK_SECRET: ${STATUS_CALLBACK_SECRET:?set STATUS_CALLBACK_SECRET in .env.server}
      TEMPORAL_ADDRESS: temporal:7233
      ARTIFACT_ROOT: /workspace/artifacts
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.server}
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "${UI_PORT:-18030}:3000"
    volumes:
      - artifacts:/workspace/artifacts

  worker:
    image: oversecured-worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
      args:
        ANDROID_API: ${ANDROID_API:-34}
    restart: on-failure
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      ARTIFACT_ROOT: /workspace/artifacts
      # Baked android.jar (see orchestrator/Dockerfile). Explicit override beats ANDROID_HOME.
      SAST_ANDROID_JAR: /opt/android/android-${ANDROID_API:-34}/android.jar
      # AI triage step (always-on, fail-soft). Without a key it writes an empty sidecar.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-haiku-4.5}
    volumes:
      - artifacts:/workspace/artifacts
      - ./rules:/workspace/artifacts/rules:ro
      - ./test-subjects:/workspace/test-subjects:ro

volumes:
  temporal-postgres:
  pb-data:
  artifacts:
