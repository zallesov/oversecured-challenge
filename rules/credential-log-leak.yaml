version: 1
rules:
  - id: ANDROID_CREDENTIAL_LOG_LEAK
    vulnerability_class: sensitive-data-logging
    severity: error
    cwe: CWE-532
    owasp_mobile: M9
    message: "Credentials flow into android.util.Log (sensitive data written to logcat)"

    manifest_conditions:
      reachable_from_exported: true     # LoginActivity is exported (action LOGIN)

    # LoginActivity.processLogin:
    #   LoginData loginData = new LoginData(email, password);   // email/password from EditText.getText()
    #   Log.d("ovaa", "Processing " + loginData);               // :59  (toString() -> "email:password")
    #
    # email = ((TextView) findViewById(...)).getText().toString();
    #   getText()  = source        -> tainted CharSequence
    #   toString() = propagator    -> tainted String
    #   new LoginData(email, ...)  -> tainted object (constructor taint-through)
    #   "Processing " + loginData  -> tainted via native string-concat handling
    sources:
      - signature: "android.widget.TextView: java.lang.CharSequence getText()"
      # stored-credential accessor, in case creds are logged from the persisted copy
      - signature: "oversecured.ovaa.utils.LoginUtils: oversecured.ovaa.objects.LoginData getLoginData()"

    sinks:
      - signature: "android.util.Log: int d(java.lang.String,java.lang.String)"
        tainted_args: [1]
      - signature: "android.util.Log: int v(java.lang.String,java.lang.String)"
        tainted_args: [1]
      - signature: "android.util.Log: int i(java.lang.String,java.lang.String)"
        tainted_args: [1]
      - signature: "android.util.Log: int w(java.lang.String,java.lang.String)"
        tainted_args: [1]
      - signature: "android.util.Log: int e(java.lang.String,java.lang.String)"
        tainted_args: [1]
      - signature: "android.util.Log: int wtf(java.lang.String,java.lang.String)"
        tainted_args: [1]

    sanitizers: []

    propagators:
      # carry taint across the .toString() that turns getText()'s CharSequence into a String
      - "java.lang.CharSequence: java.lang.String toString()"
      - "java.lang.Object: java.lang.String toString()"
      - "oversecured.ovaa.objects.LoginData: java.lang.String toString()"
