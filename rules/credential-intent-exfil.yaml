version: 1
rules:
  - id: ANDROID_CREDENTIAL_INTENT_EXFIL
    vulnerability_class: sensitive-data-exfiltration
    severity: error
    cwe: CWE-200
    owasp_mobile: M2
    message: "Credentials placed into an Intent extra are sent out via broadcast / implicit activity launch"

    manifest_conditions:
      reachable_from_exported: true     # MainActivity is exported (action ACTIVITY_MAIN)

    # MainActivity onClick handlers:
    #   #7  i.putExtra("payload", loginUtils.getLoginData()); sendBroadcast(i);
    #   #8  token = WeakCrypto.encrypt(loginData.toString());
    #       i.putExtra("url", "...?token=" + token); startActivity(i);
    sources:
      - signature: "oversecured.ovaa.utils.LoginUtils: oversecured.ovaa.objects.LoginData getLoginData()"

    # A carrier taints the Intent it is called on when a tainted value is put into it.
    carriers:
      - "android.content.Intent: android.content.Intent putExtra(java.lang.String,java.io.Serializable)"
      - "android.content.Intent: android.content.Intent putExtra(java.lang.String,java.lang.String)"
      - "android.content.Intent: android.content.Intent putExtra(java.lang.String,java.lang.CharSequence)"
      - "android.content.Intent: android.content.Intent putExtra(java.lang.String,android.os.Parcelable)"
      - "android.content.Intent: android.content.Intent putExtra(java.lang.String,android.os.Bundle)"

    sinks:
      - signature: "android.content.ContextWrapper: void sendBroadcast(android.content.Intent)"
        tainted_args: [0]
      - signature: "android.content.Context: void sendBroadcast(android.content.Intent)"
        tainted_args: [0]
      - signature: "android.app.Activity: void startActivity(android.content.Intent)"
        tainted_args: [0]
      - signature: "android.content.ContextWrapper: void startActivity(android.content.Intent)"
        tainted_args: [0]
      - signature: "android.content.Context: void startActivity(android.content.Intent)"
        tainted_args: [0]

    sanitizers: []                      # protectActivityIntent(...) is cosmetic, not a real sanitizer

    propagators:
      - "java.lang.Object: java.lang.String toString()"
      - "oversecured.ovaa.objects.LoginData: java.lang.String toString()"
      # Credentials reversibly encoded (weak hardcoded-key AES + Base64) are still a leak: taint
      # survives WeakCrypto.encrypt so token in the implicit-intent URL (#8) is flagged.
      - "java.lang.String: byte[] getBytes()"
      - "javax.crypto.Cipher: byte[] doFinal(byte[])"
      - "android.util.Base64: java.lang.String encodeToString(byte[],int)"
