services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-postgres:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.29.6
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.51.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.28.4
    # Bind 0.0.0.0 so other containers/the browser can reach PB, and pin the data dir to the volume.
    command: ["serve", "--http=0.0.0.0:8090", "--dir", "/pb_data", "--migrationsDir", "/pb_migrations"]
    environment:
      # Dev defaults — documented, not secret
      PB_ADMIN_EMAIL: admin@example.com
      PB_ADMIN_PASSWORD: DevPassword123!
    ports:
      - "8090:8090"
    volumes:
      - pb-data:/pb_data
      - ./ui/pb_migrations:/pb_migrations:ro

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        # Browser-reachable PB URL baked into the client bundle at build time
        VITE_POCKETBASE_URL: http://localhost:8090
    depends_on:
      - temporal
      - pocketbase
    environment:
      # Server-to-PB (internal network)
      POCKETBASE_URL: http://pocketbase:8090
      # Superuser credentials — must match PB_ADMIN_* in the pocketbase service
      POCKETBASE_ADMIN_EMAIL: admin@example.com
      POCKETBASE_ADMIN_PASSWORD: DevPassword123!
      # Base URL the backend advertises to the worker for status callbacks
      INTERNAL_BASE_URL: http://ui:3000
      # Shared secret for validating inbound status callbacks from the worker
      STATUS_CALLBACK_SECRET: dev-callback-secret
      TEMPORAL_ADDRESS: temporal:7233
      ARTIFACT_ROOT: /workspace/artifacts
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./artifacts:/workspace/artifacts

  worker:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    depends_on:
      - temporal
    restart: on-failure
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      ARTIFACT_ROOT: /workspace/artifacts
      # Lets the parser's symbol solver resolve framework calls (WebView.loadUrl, etc.) on a
      # decompiled APK; without an android.jar the taint matcher matches nothing.
      ANDROID_HOME: /opt/android-sdk
    volumes:
      - ./artifacts:/workspace/artifacts
      - ./rules:/workspace/artifacts/rules:ro
      - ./test-subjects:/workspace/test-subjects:ro
      # Host Android SDK, read-only — provides platforms/android-*/android.jar.
      - ${ANDROID_SDK_ROOT:-${HOME}/Library/Android/sdk}:/opt/android-sdk:ro

  minio:
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    profiles:
      - minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data

volumes:
  temporal-postgres:
  pb-data:
