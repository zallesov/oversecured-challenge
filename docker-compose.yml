services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-postgres:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.29.6
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.51.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  ui-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ui
      POSTGRES_PASSWORD: ui
      POSTGRES_DB: ui
    volumes:
      - ui-postgres:/var/lib/postgresql/data

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    depends_on:
      - temporal
      - ui-postgres
    environment:
      DATABASE_URL: postgres://ui:ui@ui-postgres:5432/ui
      TEMPORAL_ADDRESS: temporal:7233
      ARTIFACT_ROOT: /workspace/artifacts
      JWT_SECRET: local-dev-secret
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./artifacts:/workspace/artifacts

  worker:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    depends_on:
      - temporal
    restart: on-failure
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      ARTIFACT_ROOT: /workspace/artifacts
      # Lets the parser's symbol solver resolve framework calls (WebView.loadUrl, etc.) on a
      # decompiled APK; without an android.jar the taint matcher matches nothing.
      ANDROID_HOME: /opt/android-sdk
    volumes:
      - ./artifacts:/workspace/artifacts
      - ./rules:/workspace/artifacts/rules:ro
      - ./test-subjects:/workspace/test-subjects:ro
      # Host Android SDK, read-only — provides platforms/android-*/android.jar.
      - ${ANDROID_SDK_ROOT:-${HOME}/Library/Android/sdk}:/opt/android-sdk:ro

  minio:
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    profiles:
      - minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data

volumes:
  temporal-postgres:
  ui-postgres:
