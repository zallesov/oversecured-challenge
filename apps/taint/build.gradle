plugins {
    id 'java-library'
    id 'application'
}

dependencies {
    implementation project(':common')
    implementation project(':apps:parser')
    // parser exposes javaparser only as `implementation`, so taint needs it directly
    // (AstIndex.units()/resolveSignature() expose JavaParser AST types, and the CFG/flow
    // engine and tests operate on them).
    implementation 'com.github.javaparser:javaparser-symbol-solver-core:3.26.2'
    implementation "com.fasterxml.jackson.core:jackson-databind:${rootProject.ext.jacksonVersion}"
    implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:${rootProject.ext.jacksonVersion}"
    implementation "info.picocli:picocli:${rootProject.ext.picocliVersion}"

    testImplementation project(':common')
    testImplementation project(':apps:parser')
    testImplementation project(':apps:manifest-misconfig')
    testImplementation "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:${rootProject.ext.jacksonVersion}"
    testImplementation "com.fasterxml.jackson.core:jackson-databind:${rootProject.ext.jacksonVersion}"
    testImplementation platform("org.junit:junit-bom:${rootProject.ext.junitVersion}")
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'com.oversecured.sast.taint.cli.TaintCommand'
}
