tasks.register('assemble') {
    group = 'build'
    description = 'Assembles all apps'
    
    gradle.includedBuilds.each { included ->
        dependsOn included.task(':app:assemble')
    }
}
tasks.register('clean') {
    group = 'build'
    description = 'Removes all build artifacts'
    
    gradle.includedBuilds.each { included ->
        dependsOn included.task(':app:clean')
    }
}
